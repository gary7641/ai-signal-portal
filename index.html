<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Signal Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --panel-2: #182235;
      --border: #2a3550;
      --text: #e6edf7;
      --muted: #93a4bd;
      --accent: #2dd4bf;
      --accent-2: #60a5fa;
      --danger: #ef4444;
      --good: #22c55e;
      --warn: #f59e0b;
    }

    body[data-theme="light"] {
      --bg: #f4f7fb;
      --panel: #ffffff;
      --panel-2: #eef3f9;
      --border: #d8e1ee;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #0ea5e9;
      --accent-2: #2563eb;
      --danger: #dc2626;
      --good: #16a34a;
      --warn: #d97706;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    .toolbar, .section, .card, .mini-chart-card, .swot-box {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .toolbar {
      padding: 16px;
      margin-bottom: 16px;
      display: grid;
      gap: 12px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .section {
      margin-bottom: 16px;
      overflow: hidden;
    }

    .collapsible-header {
      padding: 14px 16px;
      background: var(--panel-2);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-weight: 700;
    }

    .collapsible-body {
      padding: 16px;
      overflow: hidden;
      transition: max-height .25s ease;
      max-height: 2000px;
    }

    .collapsible-body.collapsed {
      max-height: 0 !important;
      padding-top: 0;
      padding-bottom: 0;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      padding: 16px;
      min-height: 120px;
    }

    .metric {
      font-size: 28px;
      font-weight: 800;
      margin: 8px 0;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
    }

    .bar-track {
      height: 8px;
      background: var(--panel-2);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    .symbol-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }

    .symbol-btn {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      display: inline-flex;
      gap: 8px;
      align-items: center;
    }

    .symbol-btn.active {
      background: var(--accent);
      color: #001018;
      border-color: transparent;
      font-weight: 700;
    }

    .mini-chart-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .mini-chart-card {
      padding: 12px;
      height: 160px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mini-chart-card canvas {
      flex: 1;
      width: 100% !important;
      height: 100px !important;
    }

    .mini-chart-title {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }

    .mini-chart-title .value {
      color: var(--text);
      font-weight: 700;
    }

    .chart-shell {
      height: 300px;
    }

    .chart-shell canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .ta-chart-shell {
      cursor: pointer;
    }

    .toggle-group {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toggle-mode {
      padding: 7px 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 999px;
      cursor: pointer;
    }

    .toggle-mode.active {
      background: var(--accent-2);
      color: #fff;
      border-color: transparent;
    }

    .martin-table-wrapper {
      overflow-x: auto;
      margin-top: 10px;
      margin-bottom: 16px;
    }

    .martin-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .martin-table th,
    .martin-table td {
      border: 1px solid var(--border);
      padding: 8px;
      white-space: nowrap;
    }

    .martin-header {
      margin-top: 12px;
      font-weight: 700;
    }

    .row-total-negative { color: #f87171; }
    .row-total-positive { color: #4ade80; }
    .level-safe { background: rgba(34,197,94,.08); }
    .level-risk { background: rgba(239,68,68,.08); }
    .level-high-winrate { outline: 1px solid rgba(250,204,21,.5); }

    .swot-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .swot-box {
      padding: 12px;
      min-height: 120px;
      line-height: 1.6;
    }

    .swot-center {
      grid-column: 2 / span 1;
      min-height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
    }

    .ta-modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 9999;
    }

    .ta-modal.open {
      display: block;
    }

    .ta-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,.7);
    }

    .ta-modal-panel {
      position: relative;
      width: min(960px, calc(100vw - 32px));
      margin: 40px auto;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      z-index: 2;
    }

    .ta-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .ta-modal-chart {
      height: 420px;
    }

    input, select, button {
      font: inherit;
    }

    @media (max-width: 900px) {
      .grid-3, .grid-2, .swot-grid {
        grid-template-columns: 1fr;
      }
      .swot-center {
        grid-column: auto;
      }
    }
  </style>
</head>
<body data-theme="light">
  <div class="wrap">
    <div class="toolbar">
      <div class="toolbar-row">
        <input type="file" id="csvFile" accept=".csv" />
        <select id="eaSelect">
          <option value="SMA">SMA</option>
          <option value="FLASH">FLASH</option>
          <option value="MKD">MKD</option>
          <option value="S10">S10</option>
          <option value="OtherBasic">OtherBasic</option>
        </select>
        <button id="analyzeBtn">Analyze</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="toolbar-row">
        <label class="toggle-group">
          <span>Theme</span>
          <input type="checkbox" id="themeSwitch" />
        </label>

        <span id="cumSwitchWrapper" class="toggle-group">
          <span>Cumulative Separate</span>
          <input type="checkbox" id="cumSwitch" />
        </span>

        <div class="toggle-group">
          <button class="toggle-mode active" data-mode="pips">Pips</button>
          <button class="toggle-mode" data-mode="money">Money</button>
        </div>

        <span id="eaTag">EA</span>
      </div>
    </div>

    <div id="taPanel" style="display:none;">
      <section id="summaryCardsSection" class="section" style="display:none;">
        <div class="collapsible-header" data-target="summaryCardsBody">
          <span>Summary Cards</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="summaryCardsBody" class="collapsible-body">
          <div class="grid-3">
            <div class="card">
              <div class="muted">Growth</div>
              <div class="metric" id="growthValue">0 %</div>
              <div class="muted" id="growthPeriod"></div>
            </div>

            <div class="card">
              <div class="muted">Equity</div>
              <div class="metric" id="equityValue">0.00</div>
              <div class="bar-track"><div id="equityBar" class="bar-fill"></div></div>
            </div>

            <div class="card">
              <div class="muted">Profit / Initial Deposit</div>
              <div><span id="profitValue">0.00</span> / <span id="initialDepositValue">0.00</span></div>
              <div class="bar-track"><div id="profitBar" class="bar-fill"></div></div>
            </div>
          </div>

          <div class="grid-2" style="margin-top:16px;">
            <div class="card ta-chart-shell" data-chart="equity">
              <div class="muted">Equity Growth</div>
              <div class="chart-shell"><canvas id="taEquityChart"></canvas></div>
            </div>
            <div class="card ta-chart-shell" data-chart="radar">
              <div class="muted">EA Radar</div>
              <div class="chart-shell"><canvas id="taRadarChart"></canvas></div>
            </div>
          </div>

          <div class="grid-3" style="margin-top:16px;">
            <div class="card"><div class="muted">Profit Trades</div><div id="radarProfitTrades"></div></div>
            <div class="card"><div class="muted">Loss Trades</div><div id="radarLossTrades"></div></div>
            <div class="card"><div class="muted">Deposit Load</div><div id="radarDepositLoad"></div></div>
            <div class="card"><div class="muted">Max DD</div><div id="radarMaxDD"></div></div>
            <div class="card"><div class="muted">Activity</div><div id="radarActivity"></div></div>
            <div class="card"><div class="muted">Algo Score</div><div id="radarAlgoScore"></div></div>
          </div>
        </div>
      </section>

      <section id="accountSection" class="section">
        <div class="collapsible-header" data-target="accountBody">
          <span>Account</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="accountBody" class="collapsible-body">
          <div id="accountStats" class="card"></div>
          <div id="minimumArea" class="card" style="margin-top:12px;"></div>
          <div class="grid-3" style="margin-top:12px;">
            <div class="card"><div class="chart-shell"><canvas id="equityChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="weekdayChart"></canvas></div></div>
            <div class="card ta-chart-shell" data-chart="symbol"><div class="chart-shell"><canvas id="symbolProfitChart"></canvas></div></div>
          </div>
        </div>
      </section>

      <section id="symbolSection" class="section" style="display:none;">
        <div class="collapsible-header" data-target="symbolBody">
          <span>Symbols</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="symbolBody" class="collapsible-body">
          <div id="symbolButtons" class="symbol-buttons"></div>
          <div id="symbolMiniCharts" class="mini-chart-grid"></div>
        </div>
      </section>

      <section id="symbolDetailSection" class="section" style="display:none;">
        <div class="collapsible-header" data-target="symbolDetailBody">
          <span id="symbolTitle">5. Symbol</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="symbolDetailBody" class="collapsible-body">
          <div id="symbolStats" class="card"></div>

          <div class="grid-3" style="margin-top:12px;">
            <div class="card"><div class="chart-shell"><canvas id="mfeChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="maeChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="holdingChart"></canvas></div></div>
          </div>

          <div class="grid-2" style="margin-top:12px;">
            <div class="card"><div class="chart-shell"><canvas id="symbolCumulativeChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="symbolWeekdayProfitChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="symbolWeekdayCountChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="symbolHourlyProfitChart"></canvas></div></div>
            <div class="card"><div class="chart-shell"><canvas id="symbolHourlyCountChart"></canvas></div></div>
          </div>
        </div>
      </section>

      <section id="martinSection" class="section" style="display:none;">
        <div class="collapsible-header" data-target="martinBody">
          <span>Martin</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="martinBody" class="collapsible-body">
          <div id="martinTables"></div>
        </div>
      </section>

      <section id="swotSection" class="section" style="display:none;">
        <div class="collapsible-header" data-target="swotBody">
          <span>SWOT</span>
          <span class="collapse-toggle">－</span>
        </div>
        <div id="swotBody" class="collapsible-body">
          <div class="swot-grid">
            <div id="swotST" class="swot-box"></div>
            <div id="swotS" class="swot-box"></div>
            <div id="swotSW" class="swot-box"></div>

            <div id="swotT" class="swot-box"></div>
            <div id="swotCenterText" class="swot-box swot-center"></div>
            <div id="swotW" class="swot-box"></div>

            <div id="swotOT" class="swot-box"></div>
            <div id="swotO" class="swot-box"></div>
            <div id="swotOW" class="swot-box"></div>
          </div>

          <div id="eaCenterAnalysis" class="card" style="margin-top:12px;"></div>
        </div>
      </section>
    </div>
  </div>

  <div id="taChartModal" class="ta-modal">
    <div class="ta-modal-backdrop"></div>
    <div class="ta-modal-panel">
      <div class="ta-modal-head">
        <h3 id="taModalTitle">Chart</h3>
        <button id="taModalClose">Close</button>
      </div>
      <div id="taModalChartContainer" class="ta-modal-chart"></div>
    </div>
  </div>

  <script src="./trade-analyzer.js"></script>
</body>
</html>
