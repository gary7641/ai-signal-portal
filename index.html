<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Hub | Quant Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="sidebar">
        <div class="logo">
            <span class="gold-icon">💰</span> AI SIGNAL HUB
        </div>
        <nav>
            <div class="nav-item active">📊 策略概覽</div>
            <div class="nav-item">📈 品種分析</div>
            <div class="nav-item">🛡️ 風險評核</div>
        </nav>
        <div class="sidebar-footer">v2.0 Beta</div>
    </div>

    <main class="content">
        <header class="main-header">
            <h1>量化交易分析終端</h1>
            <div class="upload-zone">
                <input type="file" id="csvFileInput" accept=".csv">
                <button id="analyzeBtn" class="primary-btn">開始分析數據</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="card">
                <div class="label">總淨利潤</div>
                <div class="value profit" id="netProfit">$0.00</div>
            </div>
            <div class="card">
                <div class="label">最大回撤 (DD)</div>
                <div class="value loss" id="maxDrawdown">$0.00</div>
            </div>
            <div class="card">
                <div class="label">勝率</div>
                <div class="value" id="winRate">0%</div>
            </div>
            <div class="card">
                <div class="label">帳戶等級</div>
                <div class="value" id="accountRank" style="color: #cd7f32;">Bronze</div>
            </div>
        </div>

        <div class="chart-section">
            <div class="chart-container main-chart">
                <h3>資金增長曲線 (Equity Curve)</h3>
                <canvas id="equityChart"></canvas>
            </div>
            <div class="chart-container side-chart">
                <h3>雷達評核 (EA Radar)</h3>
                <canvas id="radarChart"></canvas>
            </div>
        </div>

        <div class="detail-section">
            <div class="card table-card">
                <h3>品種表現分析</h3>
                <div id="symbolButtons" class="btn-group"></div>
                <div id="statsTableContainer">
                    <p class="placeholder">請先匯入數據進行分析...</p>
                </div>
            </div>
        </div>

        <div id="debugLog" class="debug-console">系統就緒。</div>
    </main>

    <script src="js/core-math.js"></script>
    <script src="js/ui-render.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
