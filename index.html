<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Hub | 專業量化分析終端</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg: #0f111a;
            --card-bg: #1a1d2e;
            --primary: #0d9fff;
            --accent: #9d4edd;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --profit: #06d6a0;
            --loss: #ef476f;
            --gold: #ffcc00;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 上傳區域 */
        .upload-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }

        input[type="file"] {
            color: var(--text-dim);
        }

        button#analyzeBtn {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button#analyzeBtn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* 數據卡片佈局 */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card-label { color: var(--text-dim); font-size: 14px; margin-bottom: 10px; }
        .card-value { font-size: 24px; font-weight: bold; }
        .card-value.profit { color: var(--profit); }

        /* 圖表區域 */
        .charts-container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            height: 350px;
        }

        /* 品種選擇按鈕 */
        .symbol-section {
            margin-top: 20px;
        }

        .symbol-btn {
            background: #2a2e45;
            color: white;
            border: none;
            padding: 8px 15px;
            margin-right: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .symbol-btn:hover { background: var(--primary); }

        /* 底部數據表 */
        .stats-table-box {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 12px; border-bottom: 1px solid #333; }
        b { color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <span>AI Signal Hub</span>
            <span style="font-size: 28px;">💰</span> </div>
        <div style="color: var(--text-dim);">策略分析終端 v1.0</div>
    </header>

    <div class="upload-section">
        <label>匯入 MT4 報表 (CSV): </label>
        <input type="file" id="csvFileInput" accept=".csv">
        <button id="analyzeBtn">開始分析 📊</button>
    </div>

    <div class="summary-grid">
        <div class="card">
            <div class="card-label">總利潤 (Net Profit)</div>
            <div class="card-value profit" id="profitValue">0.00</div>
        </div>
        <div class="card">
            <div class="card-label">最大回撤 (Max Drawdown)</div>
            <div class="card-value" id="radarMaxDD" style="color: var(--loss);">0.00</div>
        </div>
        <div class="card">
            <div class="card-label">交易活動</div>
            <div class="card-value" id="radarActivity">0 trades</div>
        </div>
        <div class="card">
            <div class="card-label">分析期間</div>
            <div class="card-value" id="growthPeriod" style="font-size: 16px;">--</div>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box">
            <h4 style="margin-top:0;">策略評分 (EA Radar)</h4>
            <canvas id="radarChart"></canvas>
        </div>
        <div class="chart-box">
            <h4 style="margin-top:0;">資金增長曲線 (Equity Curve)</h4>
            <canvas id="equityChart"></canvas>
        </div>
    </div>

    <div class="card">
        <h4>品種深入分析 (Symbol Deep Dive)</h4>
        <div id="symbolButtons" class="symbol-section">
            </div>
        <div id="accountStats" class="stats-table-box">
            <p style="color:var(--text-dim)">請先上傳檔案並點擊「開始分析」</p>
        </div>
    </div>

    <script src="js/trade-analyzer.js"></script>

</body>
</html>
