<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Hub - Signal Detail</title>
    <style>
        :root[data-theme="light"] {
            --bg-color: #f4f7f6; /* History Analyzer 溫潤底色 */
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-gold: #d4af37;
            --status-active: #27ae60;
            --status-inactive: #e74c3c;
            --border-color: #dddddd;
        }

        :root[data-theme="dark"] {
            --bg-color: #1a1c1e; /* 深炭灰，非純黑 */
            --card-bg: #2d2f31;
            --text-main: #e0e0e0;
            --text-sub: #aaaaaa;
            --accent-gold: #ffcc00;
            --status-active: #2ecc71;
            --status-inactive: #ff4757;
            --border-color: #444444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            transition: all 0.3s ease;
        }

        /* Layout Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Signal Header Card */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .badge-diamond {
            color: var(--accent-gold);
            font-weight: bold;
            text-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
        }

        /* Raw Data Grid */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .data-item {
            border-left: 4px solid var(--border-color);
            padding-left: 15px;
        }

        /* Version List */
        .version-list {
            list-style: none;
            padding: 0;
        }

        .version-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
        }

        /* Button Style */
        .btn-toggle {
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <header class="top-bar">
        <h1>AI Signal Hub 🚀</h1>
        <button class="btn-toggle" onclick="toggleTheme()">🌓 Switch Mode</button>
    </header>

    <section class="card">
        <div class="signal-header">
            <div>
                <h2 id="signal-name">XAUUSD Scalper Pro</h2>
                <p>Creator: <span class="badge-diamond">💎 Diamond Master</span> (Points: 4,500)</p>
            </div>
            <div id="survival-status" style="color: var(--status-active); font-weight: bold;">
                ● ACTIVE (Equity > $100)
            </div>
        </div>

        <div class="data-grid">
            <div class="data-item">
                <small>Balance (Raw)</small>
                <div style="font-size: 1.5rem; font-weight: bold;">
                    1,250.00 <span style="font-size: 0.9rem; color: var(--text-sub);">USD</span>
                </div>
            </div>
            <div class="data-item" style="border-left-color: var(--accent-gold);">
                <small>Equity (Gold Data)</small>
                <div style="font-size: 1.5rem; font-weight: bold;">
                    💰 1,280.45
                </div>
            </div>
            <div class="data-item">
                <small>Max Drawdown</small>
                <div style="font-size: 1.5rem; font-weight: bold; color: var(--status-inactive);">
                    8.5%
                </div>
            </div>
        </div>
    </section>

    <section class="card">
        <h3>📦 EA Parameter Set Files</h3>
        <ul class="version-list">
            <li class="version-item">
                <span><strong>v1.2</strong> - Reduced Gold Risk Offset</span>
                <small>2026-03-25</small>
            </li>
            <li class="version-item">
                <span><strong>v1.1</strong> - Initial Optimization</span>
                <small>2026-03-10</small>
            </li>
        </ul>
    </section>

    <section style="display: flex; gap: 10px;">
        <button class="btn-toggle" style="flex: 1;">👍 Like Signal (+1 Point)</button>
        <button class="btn-toggle" style="flex: 1;">💬 Request Private Handshake</button>
    </section>
</div>

<script>
    function toggleTheme() {
        const root = document.documentElement;
        const currentTheme = root.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        root.setAttribute('data-theme', newTheme);
    }
</script>

</body>
</html>
