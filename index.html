<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Hub - Admin Restricted</title>
    <style>
        :root[data-theme="light"] {
            --bg-body: #f7fafc;
            --bg-card: #ffffff;
            --text-title: #2d3748;
            --text-content: #4a5568;
            --primary: #319795;
            --border: #e2e8f0;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        :root[data-theme="dark"] {
            --bg-body: #1a202c;
            --bg-card: #2d3748;
            --text-title: #f7fafc;
            --text-content: #cbd5e0;
            --primary: #4fd1c5;
            --border: #4a5568;
            --shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: 0.2s; }
        body { background-color: var(--bg-body); color: var(--text-content); font-family: system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        .sidebar { width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; background: var(--bg-card); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: var(--bg-card); padding: 12px 24px; display: flex; justify-content: flex-end; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); }

        /* Admin Badge */
        #adminBadge { display: none; background: #ed8936; color: white; padding: 2px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }

        .container { padding: 32px; max-width: 1000px; margin: 0 auto; width: 100%; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; }
        
        /* 預設隱藏 Inventory */
        #adminInventorySection { display: none; border: 2px solid #ed8936; }

        .inventory-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .inventory-table th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); }
        .inventory-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .btn-start { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }
        .btn-login { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<nav class="sidebar">
    <div style="font-weight: 800; color: var(--primary); font-size: 1.3rem; margin-bottom: 30px;">AI SIGNAL HUB</div>
    <div id="adminMenuTitle" style="display:none; font-size: 0.75rem; color: #ed8936; margin-bottom: 10px;">ADMIN ACCESS ONLY</div>
    <div id="inventoryLink" style="display:none; color: var(--text-title); padding: 10px 0;">📂 全局檔案管理</div>
</nav>

<main class="main-content">
    <header class="header">
        <span id="adminBadge">ADMIN MODE</span>
        <button class="btn-login" id="gmailBtn" onclick="simulateAdminLogin()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <span id="loginText">Login as Admin</span>
        </button>
    </header>

    <div class="container">
        <section class="card">
            <h2>開始分析</h2>
            <input type="file" id="csvFile" accept=".csv" style="width:100%; padding:10px;">
            <button id="startBtn" class="btn-start" style="margin-top:10px;">🚀 分析數據</button>
        </section>

        <section class="card" id="adminInventorySection">
            <h2 style="color: #ed8936;">📦 Files Inventory (Admin Only)</h2>
            <table class="inventory-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>File Name</th>
                        <th>User</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="inventoryBody">
                    </tbody>
            </table>
        </section>
    </div>
</main>

<script>
    let isAdmin = false;
    let fileInventory = [];

    // 模擬 Login
    function simulateAdminLogin() {
        isAdmin = !isAdmin; // 切換身份
        const section = document.getElementById('adminInventorySection');
        const badge = document.getElementById('adminBadge');
        const sideTitle = document.getElementById('adminMenuTitle');
        const sideLink = document.getElementById('inventoryLink');
        const loginText = document.getElementById('loginText');

        if (isAdmin) {
            section.style.display = 'block';
            badge.style.display = 'inline-block';
            sideTitle.style.display = 'block';
            sideLink.style.display = 'block';
            loginText.innerText = "Logout (Admin)";
            alert("已切換至 Admin 權限，後台庫存已解鎖。");
        } else {
            section.style.display = 'none';
            badge.style.display = 'none';
            sideTitle.style.display = 'none';
            sideLink.style.display = 'none';
            loginText.innerText = "Login as Admin";
        }
    }

    // 分析邏輯
    document.getElementById('startBtn').addEventListener('click', function() {
        const fileInput = document.getElementById('csvFile');
        if (fileInput.files.length === 0) return alert("請先選擇 CSV！");

        const file = fileInput.files[0];
        const now = new Date();
        
        // 紀錄入 Inventory (就算 Admin 依家未 Login，後台數據都會照草低)
        fileInventory.unshift({
            time: now.toLocaleTimeString(),
            name: file.name,
            user: "Guest_User_01",
            status: "Success"
        });

        updateUI();
        alert("分析成功！紀錄已存入後台庫存。");
    });

    function updateUI() {
        const body = document.getElementById('inventoryBody');
        body.innerHTML = fileInventory.map(item => `
            <tr>
                <td>${item.time}</td>
                <td>${item.name}</td>
                <td>${item.user}</td>
                <td style="color:green;">${item.status}</td>
            </tr>
        `).join('');
    }
</script>

</body>
</html>
