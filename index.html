<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Signal Hub - Trading Analytics</title>
    <style>
        :root[data-theme="light"] {
            --bg-body: #f7fafc;
            --bg-card: #ffffff;
            --text-title: #2d3748;
            --text-content: #4a5568;
            --primary: #319795;
            --accent-gold: #d69e2e;
            --border: #e2e8f0;
            --status-green: #38a169;
            --status-red: #e53e3e;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        :root[data-theme="dark"] {
            --bg-body: #1a202c;
            --bg-card: #2d3748;
            --text-title: #f7fafc;
            --text-content: #cbd5e0;
            --primary: #4fd1c5;
            --accent-gold: #ed8936;
            --border: #4a5568;
            --status-green: #48bb78;
            --status-red: #f56565;
            --shadow: 0 10px 15px rgba(0,0,0,0.3);
        }

        * { box-sizing: border-box; transition: 0.3s; }
        body { background-color: var(--bg-body); color: var(--text-content); font-family: -apple-system, system-ui, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; background: var(--bg-body); }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 1.2rem; color: var(--primary); text-decoration: none; margin-bottom: 30px; }

        /* Main Area */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: var(--bg-card); padding: 12px 24px; display: flex; justify-content: flex-end; align-items: center; gap: 15px; border-bottom: 1px solid var(--border); position: sticky; top: 0; }

        /* Real Switch Style */
        .theme-switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .theme-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* Gmail Button */
        .btn-google { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem; color: #555; }

        /* Content Card */
        .container { padding: 24px; max-width: 900px; margin: 0 auto; width: 100%; }
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px; }
        .btn-start { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
        
        input[type="file"] { margin: 15px 0; display: block; width: 100%; }
    </style>
</head>
<body>

<nav class="sidebar">
    <a href="#" class="brand">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
            <path d="M50 5 L90 27.5 V72.5 L50 95 L10 72.5 V27.5 Z" stroke="var(--primary)" stroke-width="5"/>
            <path d="M30 70 L45 50 L55 60 L75 35" stroke="var(--primary)" stroke-width="6" stroke-linecap="round"/>
            <circle cx="75" cy="35" r="7" fill="var(--accent-gold)"/>
        </svg>
        <span>AI SIGNAL HUB</span>
    </a>
    <div style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px;">MENU</div>
    <div style="color: var(--primary); font-weight: bold;">📊 分析儀表板</div>
</nav>

<main class="main-content">
    <header class="header">
        <label class="theme-switch">
            <input type="checkbox" id="theme-toggle" onclick="toggleTheme()">
            <span class="slider"></span>
        </label>
        <button class="btn-google">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            Google Login
        </button>
    </header>

    <div class="container">
        <section class="card">
            <h2 style="margin-top:0; color:var(--text-title);"># 1. 匯入交易報表 CSV</h2>
            <p>請選擇您的 MT4 或 MT5 導出的歷史紀錄檔案：</p>
            <input type="file" id="csvFileInput" accept=".csv">
            
            <button id="startAnalysisBtn" class="btn-start">🚀 開始分析</button>
        </section>

        <section id="resultSection" class="card" style="display:none;">
            <h3 color:var(--primary);>分析結果</h3>
            <div id="statusOutput">等待分析中...</div>
        </section>
    </div>
</main>

<script>
    // 1. 修復「開始分析」掣嘅反應
    document.getElementById('startAnalysisBtn').addEventListener('click', function() {
        const fileInput = document.getElementById('csvFileInput');
        const output = document.getElementById('statusOutput');
        const resultSection = document.getElementById('resultSection');

        if (fileInput.files.length === 0) {
            alert("❌ 請先選擇一個 CSV 檔案！");
            return;
        }

        // 顯示結果區域
        resultSection.style.display = 'block';
        output.innerHTML = "⌛ 正在讀取數據並進行分析...";

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const text = e.target.result;
            // 模擬分析邏輯
            setTimeout(() => {
                output.innerHTML = `✅ 成功讀取 <strong>${file.name}</strong><br>
                                    分析完成！總交易筆數：${text.split('\n').length - 1} 筆。<br>
                                    <span style="color:var(--status-green)">帳戶處於健康狀態。</span>`;
            }, 1000);
        };

        reader.readAsText(file);
    });

    // 2. 修復 Theme Switch
    function toggleTheme() {
        const root = document.documentElement;
        const isDark = root.getAttribute('data-theme') === 'dark';
        const newTheme = isDark ? 'light' : 'dark';
        root.setAttribute('data-theme', newTheme);
        localStorage.setItem('hub-theme', newTheme);
    }

    // 初始化設定
    window.onload = () => {
        const savedTheme = localStorage.getItem('hub-theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-toggle').checked = (savedTheme === 'dark');
    };
</script>

</body>
</html>
